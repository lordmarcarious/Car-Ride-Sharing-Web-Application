<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="login.css">
    <style>
        body {
            background-color: #DBE4C9;
        }
        .profile-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #556B2F;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            color: #EFF5D2;
        }
        .profile-header {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            color: #DCFFB7;
        }
        .profile-form .form-group {
            margin-bottom: 15px;
        }
        .profile-form label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .profile-form input[type="text"],
        .profile-form input[type="email"],
        .profile-form input[type="date"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            background-color: #EFF5D2;
            color: #27391C;
        }
        .update-btn {
            width: 100%;
            padding: 12px;
            background-color: #C6D870;
            color: #0A400C;
            border: none;
            border-radius: 6px;
            font-size: 17px;
            cursor: pointer;
            font-weight: bold;
        }
        .update-btn:hover {
            background-color: #D9EDBF;
        }
    </style>
</head>
<body>

<div class="profile-container">
    <div class="profile-header">My Profile</div>
    <form class="profile-form">
        <div class="form-group">
            <label for="firstname">First Name</label>
            <input type="text" id="firstname" name="firstname" value="John">
            <span id="firstError" class="error"></span>
        </div>
        <div class="form-group">
            <label for="lastname">Last Name</label>
            <input type="text" id="lastname" name="lastname" value="Doe">
            <span id="lastError" class="error"></span>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="john.doe@example.com">
            <span id="emailError" class="error"></span>
        </div>
        <div class="form-group">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" name="dob" value="1990-01-01">
        </div>
        <div class="form-group">
            <label for="license">License Number</label>
            <input type="text" id="license" name="license" value="A123-456-789">
        </div>
        <span id="formError" class="error"></span>
        <button type="button" onclick="validateProfile()" id="updateBtn" class="update-btn">Update Profile</button>
    </form>
</div>
<script src="profile.js"></script>
</body>
</html>
